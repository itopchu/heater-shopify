        - generic [ref=e599]:
          - heading "Ihre Vorteile mit Design Heizungen" [level=3] [ref=e600]
          - list [ref=e601]:
            - listitem [ref=e602]:
              - strong [ref=e603]: ✔ Innovative Technologie trifft Design
              - paragraph [ref=e604]: Unsere Heizkörper sind nicht nur optisch ein Highlight, sondern auch technologisch führend. Innovative Features wie programmierbare Thermostate und energiesparende Funktionen vereinen sich mit eleganten Designs. Diese Kombination ermöglicht es Ihnen, Ihren Wohnraum nicht nur effizient zu erwärmen, sondern auch ästhetisch zu bereichern. Jedes Modell reflektiert die neuesten Trends im Heizkörperdesign und bietet gleichzeitig Spitzenleistung in Sachen Wärmeabgabe und Energieeffizienz.
            - listitem [ref=e605]:
              - strong [ref=e606]: ✔ Nachhaltigkeit und Effizienz
              - paragraph [ref=e607]: Genießen Sie die Wärme, die ebenso umweltfreundlich wie effizient ist. Unsere Heizkörper sind so konzipiert, dass sie maximale Wärme mit minimalem Energieverbrauch bieten. Dies wird unterstützt durch modernste Heiztechnologie. Sie sparen nicht nur Kosten, sondern schonen auch die Umwelt, ohne auf den gewohnten Komfort zu verzichten. Unsere Produkte sind ein echter Beitrag zu einem nachhaltigen Lebensstil und bieten Ihnen die Möglichkeit, Ihren Energieverbrauch zu optimieren und Ihre Heizkosten deutlich zu reduzieren.
            - listitem [ref=e608]:
              - strong [ref=e609]: ✔ Zufriedenheit garantiert
              - paragraph [ref=e610]: Vertrauen Sie auf die Qualität, die sich bewährt hat. Unsere Heizkörper sind umfassend getestet und zertifiziert, um Ihnen dauerhafte Zufriedenheit und Sicherheit zu gewährleisten. Mit unserer erweiterten Garantie und einem hervorragenden Kundenservice investieren Sie in Produkte, die ihre Versprechen halten. Ihre Zufriedenheit ist unser Ziel, und wir sind stolz darauf, Produkte anzubieten, die nicht nur in Funktionalität und Design überzeugen, sondern auch in ihrer Langlebigkeit und Zuverlässigkeit.
    - generic [ref=e617]:
      - heading "Unser Engagement für Qualität & Service" [level=3] [ref=e618]
      - list [ref=e619]:
        - listitem [ref=e620]:
          - strong [ref=e621]: ✔ Deutsche Qualität
          - paragraph [ref=e622]: Unsere Produkte sind ein Beispiel für deutsche Ingenieurskunst, bekannt für ihre Langlebigkeit, Effizienz und ausgezeichnete Verarbeitung. Gefertigt nach strengen Industriestandards, spiegeln sie unser Engagement für Innovation und nachhaltige Praktiken wider.
        - listitem [ref=e623]:
          - strong [ref=e624]: ✔ Schnelle und zuverlässige Lieferung
          - paragraph [ref=e625]: Wir garantieren eine schnelle und zuverlässige Lieferung Ihrer Bestellung. Wir sorgen dafür, dass alle Produkte mit größter Sorgfalt behandelt und zeitnah ausgeliefert werden, sodass Sie Ihre Produkte so schnell wie möglich in den Händen halten können.
        - listitem [ref=e626]:
          - strong [ref=e627]: ✔ 10 Jahre Garantie
          - paragraph [ref=e628]: Jedes unserer Produkte kommt mit einer umfassenden 10 Jahres-Garantie. Diese Garantie zeigt unser Vertrauen in die Haltbarkeit und Leistung unserer Heizkörper und sichert Ihre Investition langfristig ab.
      - paragraph [ref=e629]: Vertrauen Sie auf unsere bewährte deutsche Qualität und nutzen Sie unsere zuverlässige Lieferung sowie langfristige Garantie. Entdecken Sie, wie unsere Produkte Ihr Zuhause verbessern können, mit der Sicherheit, dass Sie langjährige Unterstützung und Wert erhalten.
