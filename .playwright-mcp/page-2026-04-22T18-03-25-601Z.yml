      - generic [ref=e104]:
        - paragraph [ref=e105]: Bevor wir zu XXL Heizung geformt wurden, haben wir uns in die Materie der Heizkörper eingelesen und uns weiterentwickelt. Wie kann man Heizkörper vertreiben, ohne selber den Unterschied zwischen einem qualitativ minderwertigem und einem qualitativ hochwertigen Heizkörper zu erkennen? Um das alles haben wir uns jahrelang bemüht und nun sind wir in der Position, sagen zu können, dass unsere Produkte die höchsten Standards bieten und wir ein rund um Service von der Bestellung zum Versand anbieten können.
        - paragraph [ref=e106]: Wir als Team von XXL Heizung möchten uns nun schon seit vielen Jahren noch spezieller auf Heizkörper fokussieren und ein immer größer werdendes Produktportfolio anbieten. Dabei haben wir klein angefangen und uns stetig weiterentwickelt. Wir bieten nun neben ausgewählten premium Heizkörpern auch ein Sortiment rund um das Thema Bad an.
        - paragraph [ref=e107]: Schenken Sie uns ihr Vertrauen und lassen Sie eine neue ELEGANZ durch Ihr Bad strahlen. Erkennen Sie ein neues Potenzial Ihres Bades und bereichern Sie sich mit einem echten Augenfänger. ELEGANZ wird bei uns großgeschrieben!
