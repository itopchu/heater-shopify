name: Storefront 1000133120
on: [push]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          check-latest: true
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Oxygen's build server runs inside apps/store-heating-hydrogen and
      # expects a lockfile alongside the Hydrogen package.json. In a pnpm
      # workspace the real lockfile lives at the repo root, so copy it in
      # so the deploy bundle ships with one. The copy stays local to CI.
      - name: Copy lockfile into Hydrogen workspace
        run: cp pnpm-lock.yaml apps/store-heating-hydrogen/pnpm-lock.yaml

      - name: Build and Publish to Oxygen
        working-directory: apps/store-heating-hydrogen
        # --force: the CI step copied pnpm-lock.yaml in just above, which
        # leaves the working tree "dirty" relative to HEAD. The lockfile
        # itself is identical to the committed root one, so this is safe.
        run: npx shopify hydrogen deploy --force
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000133120 }}
