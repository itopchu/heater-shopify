query RunInput {
  cart {
    deliveryGroups {
      deliveryOptions {
        handle
        title
        cost {
          amount
          currencyCode
        }
      }
    }
    lines {
      quantity
      merchandise {
        ... on ProductVariant {
          product {
            handle
            productType
            paidShippingTag: hasTags(tags: ["shipping:paid"]) {
              tag
              hasTag
            }
          }
        }
      }
    }
  }
}
